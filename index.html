<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Rock, Paper, Scissors</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <h1>Welcome to the Rock-Paper-Scissors Game!</h1>
    <div class="selection-window">
      <button id="select-rock">Rock</button>
      <button id="select-paper">Paper</button>
      <button id="select-scissors">Scissors</button>
    </div>
    <div id="temp-result"></div>
    <div id="counter">
      <p id="player-counter"> Your score: 0</p>
      <p id="computer-counter">Computer score: 0</p>
    </div>
    <div id="final-result"></div>
  </body>
</html>
